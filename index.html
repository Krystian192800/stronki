    <title>Moje Portfolio - Krystian</title>
    <style>
       
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #0f0f0f; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            overflow: hidden;
            
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%2300ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 3 10.07 19.97 12.58 12.58 19.97 10.07 3 3"></polygon></svg>'), auto;
        }

        h1 { color: #00ff88; text-shadow: 0 0 10px rgba(0,255,136,0.5); }
        
        .container { display: flex; gap: 20px; }

        .card { 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 15px; 
            text-decoration: none; 
            color: white; 
            transition: all 0.3s ease; 
            border: 1px solid #333;
            text-align: center;
           
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="%2300ff88" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v5"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v10"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v12.5a9 9 0 0 0 11.12 8.76 6 6 0 0 0 2.22-3.13 6.13 6.13 0 0 0-3.13-2.22a9 9 0 0 0-3.32-.93"/><path d="M6 18a2 2 0 0 0-2 2v0a2 2 0 0 0 2 2h10a9 9 0 0 0 9-9v0a9 9 0 0 0-9-9H6a2 2 0 0 0-2 2v0a2 2 0 0 0 2 2"/></svg>'), pointer;
        }

        .card:hover { 
            border-color: #00ff88; 
            background: #252525; 
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,255,136,0.2);
        }

        .card h3 { margin: 0 0 10px 0; color: #00ff88; }
        .card p { margin: 0; font-size: 0.9em; opacity: 0.7; }
    </style>
</head>
